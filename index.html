<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Estudos</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #202024;
            --text-color: #e1e1e6;
            --primary-color: #04d361;
            --accent-color: #a8a8b3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
            font-weight: 700;
        }

        .links-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .links-list li {
            margin-bottom: 15px;
        }

        .study-card {
            display: block;
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-color);
            border: 1px solid #323238;
            transition: transform 0.2s, border-color 0.2s;
        }

        .study-card:hover {
            transform: translateX(5px);
            border-color: var(--primary-color);
        }

        .category {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary-color);
            margin-bottom: 5px;
            display: block;
        }

        .subject {
            font-size: 1.2rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Estudos</h1>
        
        <ul class="links-list">
            <li>
                <a href="contabilidade/contabilidade-001-escrituracao.html" class="study-card">
                    <span class="category">Contabilidade</span>
                    <span class="subject">Escrituração</span>
                </a>
            </li>

            <li>
                <a href="matematica/matematica-001-sistema-de-numeracao-decimal.html" class="study-card">
                    <span class="category">Matemática</span>
                    <span class="subject">Sistema de numeração decimal | Características do sistema de numeração | Ordens e classes |Leitura e escrita de um número natural|Milhões e Bilhões | Valor relativo e valor absoluto de um algarismo</span>
                </a>
            </li>            

            </ul>
    </div>

</body>
</html>
